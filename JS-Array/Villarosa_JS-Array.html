<!DOCTYPE html>

<html>
    <head>
        
        

        <style>
            * {
                font-family: monospace;
            } body {
                background-color: cadetblue;
            }
        </style>
    </head>
    <body>
        <h1>User Registration System</h1>
        <label for="userIn">Username: </label>
        <input type="text" id="userIn"> <br> <br>
        <label for="passIn">Password: </label> 
        <input type="password" id="passIn"> <br> <br>

        <div id="buttonContainer">
        <button onclick="registerUser()">Register</button>
        <button onclick="deleteUser()">Delete</button>
        <button onclick="searchUser()">Search</button>
        <button onclick="editUser()">Edit</button>   
        </div>

        <p id="status" style="font-weight: bold;"></p>

        <div id="listContainer">
        <h2>User List:</h2>
        <p id="userList"> </p>
        </div>



        <script>
            
            var userInfo = [];
            var listText = "";   
            
            function registerUser() {
                for (var i = 0; i < userInfo.length; i += 2) {
                    if (document.getElementById("userIn").value === userInfo[i]) {
                        document.getElementById("status").style.color = "Red";
                        document.getElementById("status").innerHTML = "That user already exists!";
                        //Breaks function early (is this allowed? I already knew this trick from a highschool class)
                        return;
                    }
                }

                //My first thought was to have the password be on length + 1 then i realized it already increments on its own (i'm stupid)
                userInfo[userInfo.length] = document.getElementById("userIn").value;
                userInfo[userInfo.length] = document.getElementById("passIn").value;

                document.getElementById("status").style.color = "Black";
                document.getElementById("status").innerHTML = "Account Creation Successful!";

                updateList();
                
            } function deleteUser() {

            } function searchUser() {

            } function editUser() {

            } function updateList() {
                //Clearing input boxes
                document.getElementById("userIn").value = "";
                document.getElementById("passIn").value = "";
                //Clearing the variable to avoid duplicates
                listText="";
        
                for (var i = 0; i < userInfo.length; i += 2) {
                    listText += userInfo[i] + "<br>";
                }
                
                document.getElementById("userList").innerHTML = listText;
            
            }
        </script>
    </body>
</html>
