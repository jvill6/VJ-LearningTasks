<!DOCTYPE html>
<html>
    <head>
        <link rel="icon" href="ImgStorage/Anonymous_Globe.png">
        <link rel="stylesheet" href="styling.css">
        <title>Horizon Green</title>
        <style>
            * {
                box-sizing: border-box;
            } img {
                vertical-align: middle;
            }
        </style>
    </head>
    <body>

        <nav>
            <div class="navbar">
                <a class="navLink" href="index.html">Home</a>
                <a class="navLink" href="actions.html">Our Actions</a>
                <a class="navLink" href="gallery.html">Gallery</a>
                <a class="navLink" href="about.html">About Us</a>           
                <img class="navDeco" src="ImgStorage/Anonymous_Globe.png" style="width: 50px; height: fit-content;">
                <p class="navText" style="padding-right: 20px; padding-left: 0px; font-size: large; font-style: italic;">Horizon Green</p>
            </div>

        </nav>
        <article>
            <div class="mainContainer">
                <div class="contents">
                    <h1 class="contentText">Gallery</h1>
                    <p class="contentText">To emphasize the importance of environmental preservation, consider the following:</p>
                    <h2 class="contentText" style="text-align: center;">Clean Cities vs. Polluted Cities</h2>
                    <div class="galContainer">
                        <div class="galItems fade">
                            <div class="numbertext">1 / 4</div>
                            <img src="ImgStorage\shutterstock-1543144589.webp" style="height: 720px; width: auto; max-width: 1200px; object-fit: cover;">
                            <div class="text">Bakersfield, California</div>
                        </div>
                        <div class="galItems fade">
                            <div class="numbertext">2 / 4</div>
                            <img src="ImgStorage\NYC_AirPollution_Desk_A_d7af8eec-56ba-4682-a1fc-5ee812b9575e.jpg" style="height:720px; width: auto; max-width: 1200px; object-fit: cover;">
                            <div class="text">New York City, New York</div>
                        </div>
                        <div class="galItems fade">
                            <div class="numbertext">3 / 4 </div>
                            <img src="ImgStorage\cdec4bc7-97fa-461f-a557-40f29c46360b.webp" style="height:720px; width: auto; max-width: 1200px; object-fit: cover;">
                            <div class="text">Singapore</div>
                        </div>
                        <div class="galItems fade">
                            <div class="numbertext">4 / 4</div>
                            <img src="ImgStorage\ManilaDesktop_5aa23648-7e1e-4336-857c-610c6aacfdf6.jpg" style="height:720px; width: auto; max-width: 1200px; object-fit: cover;">
                            <div class="text">Manila, Philippines</div>
                        </div>

                        <a class="galPrevButton" onclick="plusSlides(-1)">&#10094;</a>
                        <a class="galNextButton" onclick="plusSlides(1)">&#10095;</a>
                    </div>
                    <div style="text-align: center;">
                        <span class="galDot" onclick="currentSlide(1)"></span>
                        <span class="galDot" onclick="currentSlide(2)"></span>
                        <span class="galDot" onclick="currentSlide(3)"></span>
                        <span class="galDot" onclick="currentSlide(4)"></span>
                    </div>
                </div>
            </div>
        </article>

    </body>
    <script>
        let slideIndex = 1;
        showSlides(slideIndex);

        function plusSlides(n) {
            showSlides(slideIndex += n);
        }

        function currentSlide(n) {
            showSlides(slideIndex = n);
        }

        function showSlides(n) {
            let i;
            let slides = document.getElementsByClassName("galItems");
            let dots = document.getElementsByClassName("galDot");
            if (n > slides.length) {slideIndex = 1}
            if (n < 1) {slideIndex = slides.length}
            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }
            for (i = 0; i < dots.length; i++) {
                dots[i].className = dots[i].className.replace(" active", "");
            }
            slides[slideIndex-1].style.display = "block";
            dots[slideIndex-1].className += " active";
        }
    </script>
</html>
